# AEROSPACE CONFIG - Rose Pine theme
# https://github.com/edunfelt/base16-rose-pine-scheme/blob/main/assets/palette.png
start-at-login = true

after-login-command = []

after-startup-command = [
  'exec-and-forget /opt/homebrew/opt/borders/bin/borders active_color=0xFFFFBE69 inactive_color=0xFF007692 width=8.0',
  'exec-and-forget open -a Spotify',
  'exec-and-forget open -na "Google Chrome" --args --app=https://calendar.google.com/calendar/u/0/r',
  'exec-and-forget open -a Mail',
  'exec-and-forget open -a Claude',
  'exec-and-forget open -a Slack',
  'exec-and-forget open -a Gmail',
]

exec-on-workspace-change = [
  '/bin/bash',
  '-c',
  '/Users/adrian/.config/aerospace/scripts/sync_h_accordion_gap.sh auto && /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_changed FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

on-focus-changed = [
  'move-mouse window-lazy-center',
  'exec-and-forget /opt/homebrew/bin/sketchybar --trigger front_app_switched',
  'exec-and-forget /opt/homebrew/bin/sketchybar --trigger update_windows'
]

enable-normalization-flatten-containers = false
enable-normalization-opposite-orientation-for-nested-containers = false

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
key-mapping.preset = 'qwerty'

[gaps]
outer.bottom = 40
outer.top = 56
outer.left = 10
outer.right = 10
inner.horizontal = 10
inner.vertical = 10

[exec]
inherit-env-vars = true
[exec.env-vars]
PATH = '/opt/homebrew/bin:/opt/homebrew/sbin:${PATH}'

[mode.main.binding]
alt-shift-space = 'layout floating tiling'
alt-r = [
  'mode resize',
  'exec-and-forget sketchybar --trigger send_message MESSAGE="RESIZE MODE" HOLD="true"'
]

alt-keypadMinus = 'resize smart -70'
alt-keypadPlus = 'resize smart +70'

alt-g = [
  'mode join',
  'exec-and-forget sketchybar --trigger send_message MESSAGE="JOIN MODE" HOLD="true"'
]

alt-q = ['close --quit-if-last-window']
alt-w = [
  'layout h_accordion',
  'exec-and-forget /Users/adrian/.config/aerospace/scripts/sync_h_accordion_gap.sh on',
  'exec-and-forget /opt/homebrew/bin/sketchybar --trigger accordion_mode_on'
]
alt-s = [
  'layout v_accordion',
  'exec-and-forget /Users/adrian/.config/aerospace/scripts/sync_h_accordion_gap.sh off',
  'exec-and-forget /opt/homebrew/bin/sketchybar --trigger accordion_mode_off'
]
alt-e = [
  'layout tiles horizontal vertical',
  'exec-and-forget /Users/adrian/.config/aerospace/scripts/sync_h_accordion_gap.sh off',
  'exec-and-forget /opt/homebrew/bin/sketchybar --trigger accordion_mode_off'
]
alt-b = 'exec-and-forget open -n -a Helium'
alt-shift-x = 'exec-and-forget pmset sleepnow'

alt-enter = 'exec-and-forget open -na Ghostty'

alt-f = 'macos-native-fullscreen'
alt-shift-f = 'fullscreen'

ctrl-g = 'split horizontal'
ctrl-v = 'split vertical'

alt-h = 'focus --boundaries all-monitors-outer-frame --boundaries-action stop left'
alt-j = 'focus --boundaries all-monitors-outer-frame --boundaries-action stop down'
alt-k = 'focus --boundaries all-monitors-outer-frame --boundaries-action stop up'
alt-l = 'focus --boundaries all-monitors-outer-frame --boundaries-action stop right'

alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

alt-1 = 'workspace --auto-back-and-forth 1'
alt-2 = 'workspace --auto-back-and-forth 2'
alt-3 = 'workspace --auto-back-and-forth 3'
alt-4 = 'workspace --auto-back-and-forth 4'
alt-5 = 'workspace --auto-back-and-forth 5'
alt-6 = 'workspace --auto-back-and-forth 6'
alt-7 = 'workspace --auto-back-and-forth 7'
alt-8 = 'workspace --auto-back-and-forth 8'
alt-9 = 'workspace --auto-back-and-forth 9'
alt-0 = 'workspace --auto-back-and-forth 10'

alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'
alt-shift-0 = 'move-node-to-workspace 10'

alt-tab = 'workspace-back-and-forth'
alt-p = 'move-workspace-to-monitor --wrap-around next'
alt-shift-p = [
  'move-node-to-monitor --wrap-around next',
  'focus-monitor next --wrap-around'
]

alt-shift-s = [
  'mode service',
  'exec-and-forget sketchybar --trigger send_message MESSAGE="SERVICE MODE" HOLD="true"'
]

[mode.service.binding]
esc = [
  'reload-config',
  'exec-and-forget sketchybar --trigger hide_message',
  'exec-and-forget sketchybar --reload',
  'mode main'
]
r = ['flatten-workspace-tree', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

[mode.resize.binding]
keypadMinus = 'resize smart -70'
keypadPlus = 'resize smart +70'
h = ['resize width -64']
j = ['resize height -64']
k = ['resize height +64']
l = ['resize width +64']
esc = [
  'mode main',
  'exec-and-forget sketchybar --trigger hide_message'
]
enter = [
  'mode main',
  'exec-and-forget sketchybar --trigger hide_message'
]

[mode.join.binding]
h = ['join-with left', 'mode main', 'exec-and-forget sketchybar --trigger hide_message']
j = ['join-with down', 'mode main', 'exec-and-forget sketchybar --trigger hide_message']
k = ['join-with up', 'mode main', 'exec-and-forget sketchybar --trigger hide_message']
l = ['join-with right', 'mode main', 'exec-and-forget sketchybar --trigger hide_message']
esc = [
  'mode main',
  'exec-and-forget sketchybar --trigger hide_message'
]
enter = [
  'mode main',
  'exec-and-forget sketchybar --trigger hide_message'
]

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.anthropic.claude'
run = ['move-node-to-workspace 1']

[[on-window-detected]]
if.app-id = 'com.apple.iCal'
run = ['move-node-to-workspace 8']

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
if.window-title-regex-substring = 'Calendar'
run = ['move-node-to-workspace 8']

[[on-window-detected]]
if.app-id = 'com.apple.mail'
run = ['move-node-to-workspace 9']

[[on-window-detected]]
if.app-id = 'com.google.Chrome.app.fmgjjmmmlfnkbppncabfkddbjimcfncm'
run = ['move-node-to-workspace 9']

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = ['move-node-to-workspace 7']

[[on-window-detected]]
if.app-id = 'com.spotify.client'
run = ['move-node-to-workspace 10']
